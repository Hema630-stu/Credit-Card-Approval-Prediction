<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applicant Risk Evaluation</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 30px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { background-color: #2ecc71; color: white; font-size: 16px; font-weight: bold; border: none; margin-top: 25px; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Applicant Assessment Profile</h2>
        <form action="/predict" method="POST">
            <label>Total Annual Income ($)</label>
            <input type="number" name="AMT_INCOME_TOTAL" value="50000" required>

            <label>Income Source Type</label>
            <select name="NAME_INCOME_TYPE">
                <option value="Working">Working</option>
                <option value="Commercial associate">Commercial Associate</option>
                <option value="State servant">State Servant</option>
                <option value="Pensioner">Pensioner</option>
            </select>

            <label>Highest Academic Attainment Level</label>
            <select name="NAME_EDUCATION_TYPE">
                <option value="Secondary / secondary special">Secondary / High School</option>
                <option value="Higher education">Higher Education / Degree</option>
                <option value="Incomplete higher">Incomplete Higher Education</option>
            </select>

            <label>Family Co-habitation Status</label>
            <select name="NAME_FAMILY_STATUS">
                <option value="Married">Married</option>
                <option value="Single / not married">Single / Not Married</option>
                <option value="Civil marriage">Civil Marriage</option>
                <option value="Separated">Separated</option>
            </select>

            <label>Residential Housing Setting</label>
            <select name="NAME_HOUSING_TYPE">
                <option value="House / apartment">House / Apartment</option>
                <option value="Rented apartment">Rented Apartment</option>
                <option value="With parents">With Parents</option>
            </select>

            <label>Employment Seniority Duration (Years)</label>
            <input type="number" name="Employment_Years" value="5" required>

            <label>Applicant Age (Years)</label>
            <input type="number" name="Age" value="35" required>

            <input type="submit" value="Generate Approval Analysis" class="submit-btn">
        </form>
    </div>
</body>
</html>
